<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nesky Assistant</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style2.css" />

    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div class="app">

        <!-- HEADER Z LOGO -->
        <div class="app-header">
            <img src="logo.png" alt="Nesky Logo" class="nesky-logo" />
        </div>

        <!-- WYSZUKIWARKA -->
        <div class="search-section">
            <input id="searchInput" type="text" placeholder="Szukaj w Google..." />
            <button onclick="searchGoogle()">🔍</button>
        </div>

        <!-- POGODA -->
        <div class="card">
            <h2>☀️ Pogoda</h2>
            <div id="weather">Ładowanie danych...</div>
        </div>

        <!-- MAPA -->
        <div class="card">
            <h2>🗺️ Mapa i ruch drogowy</h2>
            <div id="map" style="height: 260px;"></div>
        </div>

        <!-- NAWIGACJA -->
        <div class="card">
            <h2>📍 Nawigacja</h2>
            <div id="navControls">Ładowanie...</div>
            <button class="edit-btn" id="editPlaces">Edytuj miejsca ✏️</button>
        </div>

        <!-- WYDARZENIA -->
        <div class="card">
            <h2>🗓️ Nadchodzące wydarzenia</h2>

            <button id="googleConnectBtn" onclick="connectGoogleCalendar()">
                Połącz z Google Calendar
            </button>

            <div id="eventsList">Ładowanie...</div>

            <button id="addEventBtn">+ Dodaj wydarzenie</button>
        </div>
    </div>

    <!-- MODAL: ONBOARDING -->
    <div id="onboardingModal" class="modal">
        <div class="modal-content">
            <h2>Twoje miejsca</h2>

            <label>Dom</label>
            <input id="homeAddress" placeholder="np. ul. Kwiatowa 12" />

            <label>Praca</label>
            <input id="workAddress" placeholder="np. ul. Leśna 5" />

            <label>Miejsce 1</label>
            <input id="fav1" placeholder="np. ulubiona siłownia" />

            <label>Miejsce 2</label>
            <input id="fav2" placeholder="np. sklep" />

            <button id="saveUserData">Zapisz</button>
        </div>
    </div>

    <!-- MODAL: WYDARZENIE -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <h2>Dodaj wydarzenie</h2>

            <label>Tytuł</label>
            <input id="eventTitle" placeholder="np. Wizyta u lekarza" />

            <label>Data</label>
            <input id="eventDate" type="date" />

            <label>Godzina</label>
            <input id="eventTime" type="time" />

            <div class="event-buttons-row">
                <button class="event-btn local" id="saveEventLocalBtn">Zapisz lokalnie</button>
                <button class="event-btn google" id="saveEventGoogleBtn">Zapisz w Google</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
