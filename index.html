<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Nesky Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <!-- Leaflet Routing Machine -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css">

    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>Nesky Assistant</h1>
            <button id="themeToggle" class="theme-toggle">🌙</button>
        </header>

        <section class="search-section">
            <input id="searchInput" type="text" placeholder="Szukaj w Google...">
            <button onclick="searchGoogle()">🔍</button>
        </section>

        <section class="card">
            <h2>🌤 Pogoda</h2>
            <div id="weather">Ładowanie danych...</div>
        </section>

        <section class="card">
            <h2>🗺️ Mapa</h2>
            <div id="map" style="height: 260px; border-radius: 10px;"></div>
        </section>

        <section class="card">
            <h2>🧭 Nawigacja</h2>
            <div id="navControls">Ładowanie...</div>
        </section>

        <section class="card">
            <h2>📅 Nadchodzące wydarzenia</h2>
            <p>Integracja z kalendarzem – w przygotowaniu.</p>
        </section>
    </div>

    <!-- Onboarding -->
    <div id="onboardingModal" class="modal">
        <div class="modal-content">
            <h2>Witaj! Ustaw swoje miejsca</h2>

            <label>Dom</label>
            <input id="homeAddress" type="text">

            <label>Praca</label>
            <input id="workAddress" type="text">

            <label>Miejsce 1</label>
            <input id="fav1" type="text">

            <label>Miejsce 2</label>
            <input id="fav2" type="text">

            <button id="saveUserData">Zapisz</button>
        </div>
    </div>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Routing -->
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

    <script src="app.js"></script>
</body>
</html>
