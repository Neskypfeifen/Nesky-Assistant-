<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Nesky Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>Nesky Assistant</h1>
            <button id="themeToggle" class="theme-toggle">🌙</button>
        </header>

        <section class="search-section">
            <input id="searchInput" type="text" placeholder="Szukaj w Google...">
            <button onclick="searchGoogle()">🔍</button>
        </section>

        <section class="card">
            <h2>🌤 Pogoda</h2>
            <div id="weather">Ładowanie danych...</div>
        </section>

        <section class="card">
            <h2>🗺️ Mapa i ruch drogowy</h2>
            <div id="map" style="height:260px; border-radius:10px; overflow:hidden;"></div>
        </section>

        <section class="card">
            <h2>🧭 Nawigacja</h2>
            <div id="navControls">Ładowanie...</div>
            <button id="editPlaces" class="edit-btn">Edytuj miejsca ✏️</button>
        </section>

        <section class="card">
            <h2>📅 Nadchodzące wydarzenia</h2>
            <div id="eventsList">Ładowanie wydarzeń...</div>
            <button id="addEventBtn" class="edit-btn">+ Dodaj wydarzenie</button>
        </section>
    </div>

    <!-- ONBOARDING: MIEJSCA -->
    <div id="onboardingModal" class="modal">
        <div class="modal-content">
            <h2>Ustaw swoje miejsca</h2>

            <label>Dom</label>
            <input id="homeAddress" type="text" placeholder="np. Nikolausstraße 7, Geroldshausen">

            <label>Praca</label>
            <input id="workAddress" type="text" placeholder="np. Baumhofstraße 40, Marktheidenfeld">

            <label>Miejsce 1</label>
            <input id="fav1" type="text" placeholder="np. siłownia, sklep">

            <label>Miejsce 2</label>
            <input id="fav2" type="text" placeholder="np. rodzina, ulubione miejsce">

            <button id="saveUserData">Zapisz</button>
        </div>
    </div>

    <!-- MODAL: DODAJ WYDARZENIE -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <h2>Dodaj wydarzenie</h2>

            <label>Tytuł</label>
            <input id="eventTitle" type="text" placeholder="np. Trening">

            <label>Data</label>
            <input id="eventDate" type="date">

            <label>Godzina</label>
            <input id="eventTime" type="time">

            <button id="saveEventBtn">Zapisz</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
