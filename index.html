<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nesky Assistant</title>

    <link rel="stylesheet" href="style2.css" />

    <!-- Leaflet mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Google OAuth -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
<div class="app">

    <!-- LOGO — wariant z literą N -->
    <div class="nesky-logo-n">
        <div class="nesky-n-icon">N</div>
        <div class="nesky-n-text">
            <span class="nesky-n-main">Nesky</span>
            <span class="nesky-n-sub">Assistant</span>
        </div>
    </div>

    <!-- WYSZUKIWARKA -->
    <div class="search-section">
        <input id="searchInput" type="text" placeholder="Szukaj w Google..." />
        <button onclick="searchGoogle()">🔍</button>
    </div>

    <!-- POGODA -->
    <div class="card" id="weatherCard">
        <h2>🌤 Pogoda</h2>

        <div class="weather-main-row">
            <div>
                <div id="weatherLocation" class="weather-location">–</div>
                <div id="weatherDescription" class="weather-description">–</div>
            </div>

            <div class="weather-temp-block">
                <span id="weatherTemp" class="weather-temp">–°C</span>
                <span id="weatherFeels" class="weather-feels">odczuwalna –°C</span>
            </div>
        </div>

        <div class="weather-extra-grid">
            <div class="weather-extra-item">
                <span class="label">Wiatr</span>
                <span id="weatherWind" class="value">– m/s</span>
            </div>
            <div class="weather-extra-item">
                <span class="label">Wilgotność</span>
                <span id="weatherHumidity" class="value">– %</span>
            </div>
            <div class="weather-extra-item">
                <span class="label">Ciśnienie</span>
                <span id="weatherPressure" class="value">– hPa</span>
            </div>
            <div class="weather-extra-item">
                <span class="label">Opady</span>
                <span id="weatherRain" class="value">brak</span>
            </div>
        </div>
    </div>

    <!-- MAPA -->
    <div class="card">
        <h2>🗺 Mapa</h2>
        <div id="map" style="height: 220px;"></div>
    </div>

    <!-- NAWIGACJA -->
    <div class="card">
        <h2>📍 Nawigacja</h2>
        <div id="navControls"></div>
        <button class="edit-btn" id="editPlaces">Edytuj miejsca ✏️</button>
    </div>

    <!-- WYDARZENIA -->
    <div class="card">
        <h2>🗓 Wydarzenia</h2>
        <button id="googleConnectBtn" onclick="connectGoogleCalendar()">Połącz z Google Calendar</button>
        <div id="eventsList"></div>
        <button id="addEventBtn">Dodaj wydarzenie ➕</button>
    </div>

</div>

<!-- MODAL: miejsca -->
<div class="modal" id="onboardingModal">
    <div class="modal-content">
        <h2>Twoje miejsca</h2>

        <input id="homeAddress" placeholder="Dom" />
        <input id="workAddress" placeholder="Praca" />
        <input id="fav1" placeholder="Miejsce 1" />
        <input id="fav2" placeholder="Miejsce 2" />

        <button id="saveUserData">Zapisz</button>
    </div>
</div>

<!-- MODAL: wydarzenia -->
<div class="modal" id="eventModal">
    <div class="modal-content">
        <h2>Nowe wydarzenie</h2>

        <input id="eventTitle" placeholder="Tytuł" />
        <input id="eventDate" type="date" />
        <input id="eventTime" type="time" />

        <div class="event-buttons-row">
            <button class="event-btn local" id="saveEventLocalBtn">Lokalnie</button>
            <button class="event-btn google" id="saveEventGoogleBtn">Google</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
